name: Android APK Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: install dependencies
        run: pnpm install

      - name: setup eas
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: build android apk
        run: eas build --platform android --profile preview --non-interactive

      - name: download apk
        run: |
          APK_URL=$(eas build:list --platform android --limit 1 --json --non-interactive | jq -r '.[0].artifacts.buildUrl')
          curl -L $APK_URL -o kharcha.apk

      - name: upload apk artifact
        uses: actions/upload-artifact@v4
        with:
          name: kharcha-android
          path: kharcha.apk
          retention-days: 7

      - name: create github release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-${{ github.run_number }}
          name: Android Build ${{ github.run_number }}
          files: kharcha.apk
          body: Android APK — download and install directly on your device.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
